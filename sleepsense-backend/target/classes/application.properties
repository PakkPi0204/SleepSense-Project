server.port=8080

# Firebase
firebase.credentials.path=src/main/resources/firebase-service-account.json
firebase.database.url=https://sleepsense-3cd34-default-rtdb.firebaseio.com

# CORS (รองรับ Flutter app)
cors.allowed.origins=*

# Logging
logging.level.com.sleepsense=DEBUG

# Thresholds (ค่าที่เหมาะสมสำหรับการนอนหลับ)
threshold.co2.warning=1000
threshold.co2.critical=2000
threshold.temperature.min=18.0
threshold.temperature.max=26.0
threshold.humidity.min=40.0
threshold.humidity.max=60.0
threshold.pm25.warning=35.0
threshold.pm25.critical=75.0
threshold.light.max=50.0
threshold.noise.warning=40.0
threshold.noise.critical=60.0
